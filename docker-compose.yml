services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    env_file:
      - .env
    ports:
      - '3000:3000'
    volumes:
      - ./backend:/app
      - /app/node_modules
    command: sh -c "npm ci && npm run start:dev"

  mobile:
    build:
      context: .
      dockerfile: mobile/Dockerfile
    env_file:
      - .env
    ports:
      - '8082:8082'
      - '19000:19000'
      - '19001:19001'
      - '19002:19002'
    volumes:
      - ./mobile:/app
      - /app/node_modules
    command: sh -c "npm ci && npm run start"
    depends_on:
      - backend
